<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Protocol | The Light of Science</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --glow: rgba(212, 175, 55, 0.3);
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px var(--glow);
            max-width: 650px;
            background: rgba(255, 255, 255, 0.02);
        }
        h1 {
            color: var(--gold);
            font-size: 3.5rem;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitle {
            font-style: italic;
            color: #888;
            margin-bottom: 40px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .stat-box {
            background: #111;
            padding: 20px;
            border-radius: 10px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
        }
        .btn-mine {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-mine:hover {
            background: var(--gold);
            color: var(--dark);
            box-shadow: 0 0 20px var(--gold);
        }
        .founder-info {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #666;
        }
        .wallet-addr {
            font-family: monospace;
            color: #aaa;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#050509"/>
    
    <path d="M50 15L85 75H15L50 15Z" stroke="#404040" stroke-width="1" stroke-linejoin="round"/>
    <path d="M50 15L50 75" stroke="#303030" stroke-width="0.5"/>
    <path d="M15 75L50 45L85 75" stroke="#303030" stroke-width="0.5"/>
    
    <path d="M0 45H35L50 15" stroke="white" stroke-width="1.5" stroke-dasharray="4 4"/>
    
    <path d="M50 15L65 45L85 75" stroke="white" stroke-width="0.75" opacity="0.5"/>
    
    <path d="M65 45L100 45" stroke="#00FFFF" stroke-width="2">
        <animate attributeName="stroke-width" values="2;3;2" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite" />
    </path>
    
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <path d="M65 45L100 45" stroke="#00FFFF" stroke-width="2" filter="url(#glow)" opacity="0.3"/>
</svg>
        <h1>LUX</h1>
        <p class="subtitle">"From the Darkness of Speculation to the Light of Science"</p>
        
        <div class="stats">
            <div class="stat-box">
                <div>Total Supply</div>
                <div class="stat-value">100M LUX</div>
            </div>
            <div class="stat-box">
                <div>Network Status</div>
                <div class="stat-value" style="color: #2ecc71;">ACTIVE</div>
            </div>
        </div>

        <div style="margin-bottom: 30px;">
            <p>Founder's Vault (Locked):</p>
            <div class="stat-value">5,000,000 $LUX</div>
        </div>

        <button class="btn-mine" onclick="startMining()">Initialize Scientific Mining</button>

        <div class="founder-info">
            <p>Protocol Supervisor: <strong>ARCHITECT</strong></p>
            <p>Genesis Owner Address:</p>
            <p class="wallet-addr">0x0CB7c3B321724086542f7200261335FC487465D2</p>
        </div>
    </div>

    <script>
        function startMining() {
            alert("Scientific computing sequence initiated. Your device is now contributing to protein folding research. Rewards will be verified on-chain.");
        }
    </script>

</body>
</html>
