<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Protocol | The Light of Science</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --glow: rgba(212, 175, 55, 0.3);
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px var(--glow);
            max-width: 650px;
            background: rgba(255, 255, 255, 0.02);
        }
        h1 {
            color: var(--gold);
            font-size: 3.5rem;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitle {
            font-style: italic;
            color: #888;
            margin-bottom: 40px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .stat-box {
            background: #111;
            padding: 20px;
            border-radius: 10px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
        }
        .btn-mine {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-mine:hover {
            background: var(--gold);
            color: var(--dark);
            box-shadow: 0 0 20px var(--gold);
        }
        .founder-info {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #666;
        }
        .wallet-addr {
            font-family: monospace;
            color: #aaa;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
       <svg width="250" height="250" viewBox="0 0 250 250" version="1.1" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    
    <defs>
        <radialGradient id="brushedGold" cx="125" cy="125" r="110" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FFF8DC"/> <stop offset="30%" stop-color="#FFD700"/> <stop offset="60%" stop-color="#DAA520"/> <stop offset="100%" stop-color="#8B4513"/> </radialGradient>
        
        <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
            <stop offset="40%" stop-color="white" stop-opacity="0"/>
            <stop offset="100%" stop-color="white" stop-opacity="0.2"/>
        </linearGradient>

        <pattern id="meanderPattern" patternUnits="userSpaceOnUse" width="10" height="10">
            <path d="M0 0V8H8V2H2V6H6V4H4" fill="none" stroke="#8B4513" stroke-width="0.75"/>
        </pattern>
    </defs>
    
    <circle cx="125" cy="125" r="115" fill="url(#brushedGold)" stroke="#8B4513" stroke-width="2.5"/>
    
    <circle cx="125" cy="125" r="108" fill="none" stroke="url(#meanderPattern)" stroke-width="15" opacity="0.6"/>
    
    <circle cx="125" cy="125" r="100" fill="#CD853F" opacity="0.1"/>
    
    <text x="125" y="75" text-anchor="middle" font-family="'Times New Roman', Times, serif" font-size="38" font-weight="bold" fill="#8B4513" letter-spacing="3">L U X</text>
    
    <g transform="translate(125, 125)">
        
        <g transform="translate(40, 10) scale(1.0)">
            <ellipse cx="0" cy="0" rx="35" ry="18" fill="none" stroke="#8B4513" stroke-width="1.5"/>
            <ellipse cx="0" cy="-5" rx="35" ry="18" fill="none" stroke="#8B4513" stroke-width="1.5"/>
            <path d="M-35 0V25C-35 34.3 35 34.3 35 25V0" fill="none" stroke="#8B4513" stroke-width="1.5"/>
            <path d="M-25 -5V5 M-15 -7V3 M-5 -8V2 M5 -8V2 M15 -7V3 M25 -5V5" stroke="#DAA520" stroke-width="1"/>
            <path d="M-20 0V15 M-10 0V15 M0 0V15 M10 0V15 M20 0V15" stroke="#DAA520" stroke-width="0.75"/>
        </g>
        
        <g transform="translate(-40, 10) scale(1.0)">
            <rect x="-35" y="-18" width="70" height="6" fill="none" stroke="#8B4513" stroke-width="1.5"/> <path d="M-35 -18L0 -40L35 -18Z" fill="none" stroke="#8B4513" stroke-width="1.5"/> <rect x="-33" y="-12" width="5" height="30" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/> <rect x="-21" y="-12" width="5" height="30" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <rect x="-9" y="-12" width="5" height="30" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <rect x="3" y="-12" width="5" height="30" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <rect x="15" y="-12" width="5" height="30" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <rect x="27" y="-12" width="5" height="30" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            
            <rect x="-35" y="18" width="70" height="6" fill="none" stroke="#8B4513" stroke-width="1.5"/> </g>
        
        <g transform="translate(0, 30)">
            <path d="M-30 0L0 -60L30 0H-30Z" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <path d="M0 -60L10 -20L20 0" stroke="#DAA520" stroke-width="0.75"/>
            
            <g transform="translate(15, -5) scale(0.6)">
                <path d="M-20 0C-10 -10 10 -10 20 0C25 10 -25 10 -20 0" fill="#B8860B" stroke="#8B4513" stroke-width="1.5"/>
                <path d="M-15 0H15 M-10 0V5 M0 0V5 M10 0V5" stroke="#DAA520" stroke-width="1"/>
                <rect x="-5" y="-12" width="10" height="8" rx="2" fill="#B8860B" stroke="#8B4513" stroke-width="1.5"/> </g>
        </g>
    </g>
    
    <text x="125" y="215" text-anchor="middle" font-family="'Times New Roman', Times, serif" font-size="12" fill="#DAA520" letter-spacing="1">LIGHT OF SCIENCE</text>
    
    <circle cx="125" cy="125" r="115" fill="url(#shineGradient)" opacity="0.3"/>
    
</svg>
        <h1>LUX</h1>
        <p class="subtitle">"From the Darkness of Speculation to the Light of Science"</p>
        
        <div class="stats">
            <div class="stat-box">
                <div>Total Supply</div>
                <div class="stat-value">100M LUX</div>
            </div>
            <div class="stat-box">
                <div>Network Status</div>
                <div class="stat-value" style="color: #2ecc71;">ACTIVE</div>
            </div>
        </div>

        <div style="margin-bottom: 30px;">
            <p>Founder's Vault (Locked):</p>
            <div class="stat-value">5,000,000 $LUX</div>
        </div>

        <button class="btn-mine" onclick="startMining()">Initialize Scientific Mining</button>

        <div class="founder-info">
            <p>Protocol Supervisor: <strong>ARCHITECT</strong></p>
            <p>Genesis Owner Address:</p>
            <p class="wallet-addr">0x0CB7c3B321724086542f7200261335FC487465D2</p>
        </div>
    </div>

    <script>
        function startMining() {
            alert("Scientific computing sequence initiated. Your device is now contributing to protein folding research. Rewards will be verified on-chain.");
        }
    </script>

</body>
</html>
