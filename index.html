<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Protocol | The Light of Science</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --glow: rgba(212, 175, 55, 0.3);
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px var(--glow);
            max-width: 650px;
            background: rgba(255, 255, 255, 0.02);
        }
        h1 {
            color: var(--gold);
            font-size: 3.5rem;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitle {
            font-style: italic;
            color: #888;
            margin-bottom: 40px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .stat-box {
            background: #111;
            padding: 20px;
            border-radius: 10px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
        }
        .btn-mine {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-mine:hover {
            background: var(--gold);
            color: var(--dark);
            box-shadow: 0 0 20px var(--gold);
        }
        .founder-info {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #666;
        }
        .wallet-addr {
            font-family: monospace;
            color: #aaa;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    
    <defs>
        <radialGradient id="goldGradient" cx="100" cy="100" r="90" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FFFACD"/> <stop offset="40%" stop-color="#FFD700"/> <stop offset="80%" stop-color="#DAA520"/> <stop offset="100%" stop-color="#B8860B"/> </radialGradient>
        
        <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="white" stop-opacity="0"/>
            <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <circle cx="100" cy="100" r="90" fill="url(#goldGradient)" stroke="#8B4513" stroke-width="2"/>
    
    <circle cx="100" cy="100" r="82" stroke="#DAA520" stroke-width="1" opacity="0.5"/>
    
    <g transform="translate(100, 105) scale(0.65)">
        
        <path d="M0 -40L40 30H-40L0 -40Z" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
        <path d="M0 -40L10 0L30 20" stroke="#DAA520" stroke-width="0.5"/>
        
        <g transform="translate(55, 10) scale(0.8)">
            <ellipse cx="0" cy="0" rx="30" ry="15" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <ellipse cx="0" cy="-5" rx="30" ry="15" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <path d="M-30 0V20C-30 28.3 30 28.3 30 20V0" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <path d="M-20 -5V5 M-10 -7V3 M0 -8V2 M10 -7V3 M20 -5V5" stroke="#DAA520" stroke-width="1"/>
        </g>
        
        <g transform="translate(-55, 10) scale(0.8)">
            <rect x="-30" y="-15" width="60" height="5" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/> <path d="M-30 -15L0 -35L30 -15Z" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/> <rect x="-28" y="-10" width="4" height="25" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/> <rect x="-18" y="-10" width="4" height="25" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <rect x="-8" y="-10" width="4" height="25" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <rect x="2" y="-10" width="4" height="25" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <rect x="12" y="-10" width="4" height="25" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            <rect x="22" y="-10" width="4" height="25" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/>
            
            <rect x="-30" y="15" width="60" height="5" fill="#CD7F32" stroke="#8B4513" stroke-width="1.5"/> </g>
    </g>
    
    <g transform="translate(100, 70)" filter="url(#glow)">
        <path d="M0 0V-50M-15 -10L-30 -40M15 -10L30 -40" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7">
            <animate attributeName="stroke-width" values="2;3;2" dur="1.5s" repeatCount="indefinite" />
        </path>
    </g>
    
    <g stroke="#8B4513" stroke-width="0.5" opacity="0.3">
        <circle cx="100" cy="100" r="86" stroke-dasharray="3 6"/>
        <circle cx="100" cy="100" r="84" stroke-dasharray="1 4"/>
    </g>
    
    <text x="100" y="165" text-anchor="middle" font-family="Verdana, sans-serif" font-size="24" font-weight="bold" fill="#8B4513" letter-spacing="4">L U X</text>
    <text x="100" y="180" text-anchor="middle" font-family="Verdana, sans-serif" font-size="8" fill="#B8860B" letter-spacing="2">LIGHT OF SCIENCE</text>
    
    <circle cx="100" cy="100" r="90" fill="url(#shineGradient)" opacity="0.4"/>
    
</svg>
        <h1>LUX</h1>
        <p class="subtitle">"From the Darkness of Speculation to the Light of Science"</p>
        
        <div class="stats">
            <div class="stat-box">
                <div>Total Supply</div>
                <div class="stat-value">100M LUX</div>
            </div>
            <div class="stat-box">
                <div>Network Status</div>
                <div class="stat-value" style="color: #2ecc71;">ACTIVE</div>
            </div>
        </div>

        <div style="margin-bottom: 30px;">
            <p>Founder's Vault (Locked):</p>
            <div class="stat-value">5,000,000 $LUX</div>
        </div>

        <button class="btn-mine" onclick="startMining()">Initialize Scientific Mining</button>

        <div class="founder-info">
            <p>Protocol Supervisor: <strong>ARCHITECT</strong></p>
            <p>Genesis Owner Address:</p>
            <p class="wallet-addr">0x0CB7c3B321724086542f7200261335FC487465D2</p>
        </div>
    </div>

    <script>
        function startMining() {
            alert("Scientific computing sequence initiated. Your device is now contributing to protein folding research. Rewards will be verified on-chain.");
        }
    </script>

</body>
</html>
