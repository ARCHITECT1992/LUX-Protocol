<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Protocol | The Light of Science</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --glow: rgba(212, 175, 55, 0.3);
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px var(--glow);
            max-width: 650px;
            background: rgba(255, 255, 255, 0.02);
        }
        h1 {
            color: var(--gold);
            font-size: 3.5rem;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitle {
            font-style: italic;
            color: #888;
            margin-bottom: 40px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .stat-box {
            background: #111;
            padding: 20px;
            border-radius: 10px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
        }
        .btn-mine {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-mine:hover {
            background: var(--gold);
            color: var(--dark);
            box-shadow: 0 0 20px var(--gold);
        }
        .founder-info {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #666;
        }
        .wallet-addr {
            font-family: monospace;
            color: #aaa;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <svg width="150" height="150" viewBox="0 0 150 150" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="75" cy="75" r="70" stroke="#B8860B" stroke-width="5" fill="url(#coin_bg_gradient)"/>
    
    <circle cx="75" cy="75" r="66" stroke="#DAA520" stroke-width="1.5" stroke-dasharray="2 3"/>
    
    <circle cx="75" cy="75" r="60" fill="#CD7F32" opacity="0.3"/>
    
    <circle cx="75" cy="35" r="10" fill="#FFD700" filter="url(#sun_glow)"/>
    <path d="M75 10V25M50 20L60 28M100 20L90 28M30 40H45M120 40H105M50 55L60 48M100 55L90 48M75 60V75" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    
    <path d="M50 100L75 60L100 100H50Z" stroke="#FFD700" stroke-width="2" fill="#B8860B"/>
    <path d="M60 100L75 80L90 100" stroke="#DAA520" stroke-width="1"/>
    
    <path d="M55 120C65 110 85 110 95 120" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="75" cy="115" r="3" fill="#FFD700"/>
    
    <text x="75" y="142" text-anchor="middle" font-family="Verdana, sans-serif" font-size="16" font-weight="bold" fill="#FFD700" letter-spacing="2">L U X</text>
    <text x="75" y="152" text-anchor="middle" font-family="Verdana, sans-serif" font-size="6" fill="#DAA520" letter-spacing="1">LIGHT OF SCIENCE</text>
    
    <defs>
        <radialGradient id="coin_bg_gradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(75 75) rotate(90) scale(70)">
            <stop offset="0" stop-color="#FFD700"/>
            <stop offset="0.7" stop-color="#CD7F32"/>
            <stop offset="1" stop-color="#B8860B"/>
        </radialGradient>
        <filter id="sun_glow" x="50" y="10" width="50" height="50" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
</svg>
        <h1>LUX</h1>
        <p class="subtitle">"From the Darkness of Speculation to the Light of Science"</p>
        
        <div class="stats">
            <div class="stat-box">
                <div>Total Supply</div>
                <div class="stat-value">100M LUX</div>
            </div>
            <div class="stat-box">
                <div>Network Status</div>
                <div class="stat-value" style="color: #2ecc71;">ACTIVE</div>
            </div>
        </div>

        <div style="margin-bottom: 30px;">
            <p>Founder's Vault (Locked):</p>
            <div class="stat-value">5,000,000 $LUX</div>
        </div>

        <button class="btn-mine" onclick="startMining()">Initialize Scientific Mining</button>

        <div class="founder-info">
            <p>Protocol Supervisor: <strong>ARCHITECT</strong></p>
            <p>Genesis Owner Address:</p>
            <p class="wallet-addr">0x0CB7c3B321724086542f7200261335FC487465D2</p>
        </div>
    </div>

    <script>
        function startMining() {
            alert("Scientific computing sequence initiated. Your device is now contributing to protein folding research. Rewards will be verified on-chain.");
        }
    </script>

</body>
</html>
